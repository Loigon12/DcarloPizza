<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Hacer Pedido - D'CARLO PIZZA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e31b23",
                        "background": "#0a0a0a",
                        "surface": "#161616",
                        "outline-variant": "#2a1b1a"
                    },
                    fontFamily: {
                        "display": ["Anton"],
                        "body": ["Work Sans"],
                        "mono": ["Space Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .step-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .step-card:hover { border-color: #e31b23; }
        input:checked + .card-content { background: #e31b23; color: white; }
        .text-outline { -webkit-text-stroke: 1px rgba(227, 27, 35, 0.4); color: transparent; }
    </style>
</head>
<body class="bg-background text-white font-body min-h-screen">

    <header class="border-b border-outline-variant bg-background/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="font-display text-2xl text-primary uppercase tracking-tighter">D'CARLO PIZZA</a>
            <a href="index.html" class="flex items-center gap-2 text-sm font-mono uppercase opacity-60 hover:opacity-100 transition-all">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Volver al inicio
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="mb-12">
            <h1 class="font-display text-5xl md:text-7xl uppercase leading-none mb-4">ARMA TU <span class="text-primary italic">PEDIDO</span></h1>
            <p class="font-mono text-sm text-gray-500 uppercase tracking-widest">Paso a paso hasta el sabor brutal</p>
        </div>

        <form id="pizza-order-form" class="space-y-16">
            
            <section class="space-y-6">
                <div class="flex items-center gap-4">
                    <span class="w-10 h-10 rounded-full bg-primary flex items-center justify-center font-display text-xl">1</span>
                    <h2 class="font-display text-3xl uppercase">¿Qué tan grande el antojo?</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="size" value="pequena" class="hidden peer" required>
                        <div class="step-card p-8 rounded-3xl bg-surface peer-checked:bg-primary transition-all group h-full">
                            <span class="material-symbols-outlined text-4xl mb-4 group-hover:scale-110 transition-transform">local_pizza</span>
                            <h3 class="font-display text-2xl uppercase">Pequeña</h3>
                            <p class="text-xs font-mono opacity-60">4 Porciones • $21.900</p>
                        </div>
                    </label>

                    <label class="cursor-pointer">
                        <input type="radio" name="size" value="mediana" class="hidden peer">
                        <div class="step-card p-8 rounded-3xl bg-surface peer-checked:bg-primary transition-all group h-full">
                            <span class="material-symbols-outlined text-5xl mb-4 group-hover:scale-110 transition-transform">local_pizza</span>
                            <h3 class="font-display text-2xl uppercase">Mediana</h3>
                            <p class="text-xs font-mono opacity-60">6 Porciones • $32.700</p>
                        </div>
                    </label>

                    <label class="cursor-pointer">
                        <input type="radio" name="size" value="grande" class="hidden peer">
                        <div class="step-card p-8 rounded-3xl bg-surface peer-checked:bg-primary transition-all group h-full relative overflow-hidden">
                            <span class="material-symbols-outlined text-6xl mb-4 group-hover:scale-110 transition-transform">local_pizza</span>
                            <h3 class="font-display text-2xl uppercase">Grande</h3>
                            <p class="text-xs font-mono opacity-60">8 Porciones • $56.800</p>
                        </div>
                    </label>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-4">
                    <span class="w-10 h-10 rounded-full bg-primary flex items-center justify-center font-display text-xl">2</span>
                    <h2 class="font-display text-3xl uppercase">Elige tus sabores (Máx. 2)</h2>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Hawaiana" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Hawaiana</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Pepperoni" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Pepperoni</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Pollo Champi" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Pollo Champi</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Mexicana" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Mexicana</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Carnes" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Carnes</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="checkbox" name="flavor" value="Vegetariana" class="hidden peer">
                        <div class="p-4 rounded-xl bg-surface border border-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all font-mono text-xs uppercase">Vegetariana</div>
                    </label>
                </div>
            </section>

            <section class="space-y-6">
                <div class="flex items-center gap-4">
                    <span class="w-10 h-10 rounded-full bg-primary flex items-center justify-center font-display text-xl">3</span>
                    <h2 class="font-display text-3xl uppercase">¿A dónde la llevamos?</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-surface p-8 rounded-[2rem]">
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] uppercase text-primary tracking-widest">Nombre Completo</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">person</span>
                            <input required type="text" id="cust-name" class="w-full bg-background border-white/10 rounded-xl py-4 pl-12 focus:border-primary focus:ring-0" placeholder="Ej: Juan Pérez">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] uppercase text-primary tracking-widest">Dirección de Entrega</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">location_on</span>
                            <input required type="text" id="cust-address" class="w-full bg-background border-white/10 rounded-xl py-4 pl-12 focus:border-primary focus:ring-0" placeholder="Barrio y Calle">
                        </div>
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="font-mono text-[10px] uppercase text-primary tracking-widest">Indicaciones adicionales</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-4 text-gray-500">notes</span>
                            <textarea id="cust-notes" class="w-full bg-background border-white/10 rounded-xl py-4 pl-12 focus:border-primary focus:ring-0 min-h-[100px]" placeholder="Ej: El timbre no sirve, llamar al llegar..."></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <div class="pt-10">
                <button type="button" onclick="sendToWhatsApp()" class="w-full bg-primary py-6 rounded-2xl font-display text-3xl uppercase hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4 shadow-2xl shadow-primary/40">
                    Confirmar Pedido 
                    <span class="material-symbols-outlined text-4xl">send</span>
                </button>
                <p class="text-center font-mono text-[10px] mt-6 opacity-40 uppercase tracking-widest">Se abrirá WhatsApp para finalizar el pago</p>
            </div>
        </form>
    </main>

    <footer class="py-12 border-t border-white/5 text-center opacity-40 font-mono text-[10px]">
        D'CARLO PIZZA • QUE CHIMBA LA PIZZA • 2024
    </footer>

    <script>
        function sendToWhatsApp() {
            const size = document.querySelector('input[name="size"]:checked')?.value;
            const flavors = Array.from(document.querySelectorAll('input[name="flavor"]:checked')).map(f => f.value);
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            const notes = document.getElementById('cust-notes').value;

            if (!size || flavors.length === 0 || !name || !address) {
                alert('Por favor completa los campos obligatorios (Tamaño, sabores, nombre y dirección)');
                return;
            }

            if (flavors.length > 2) {
                alert('Máximo puedes elegir 2 sabores');
                return;
            }

            const message = `*NUEVO PEDIDO D'CARLO*%0A---------------------------%0A*Tamaño:* ${size.toUpperCase()}%0A*Sabores:* ${flavors.join(' - ')}%0A---------------------------%0A*Cliente:* ${name}%0A*Dirección:* ${address}%0A*Notas:* ${notes}%0A---------------------------%0A_Enviado desde el sitio web_`;
            
            const whatsappNumber = "573169080603";
            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
